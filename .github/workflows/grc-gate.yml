name: grc-gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform

jobs:
  grc-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug OIDC token
        run: |
          curl -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" \
            | python3 -c "import sys,json,base64; t=json.load(sys.stdin)['value']; p=t.split('.')[1]; p+='='*(-len(p)%4); print(json.dumps(json.loads(base64.b64decode(p)), indent=2))"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Install Conftest
        run: |
          curl -fsSL https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin conftest

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false
          terraform plan -out=tfplan -no-color | tee plan.txt
          terraform show -json tfplan > plan.json

      - name: Conftest policy gate
        id: conftest
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          mkdir -p ../evidence
          {
            echo "["
            FIRST=1
            for ns in compliance.soc2.cc6_1_s3_kms compliance.soc2.cc6_1_dynamodb_kms compliance.soc2.cc6_7_s3_tls compliance.soc2.a1_2_s3_versioning compliance.soc2.cc6_3_iam_least_privilege; do
              [[ $FIRST -eq 1 ]] && FIRST=0 || printf ","
              conftest test --policy ../policies --namespace "$ns" --output=json plan.json || true
            done
            echo "]"
          } > ../evidence/conftest-results.json
          python3 -c '
          import json, sys
          d = json.load(open("../evidence/conftest-results.json"))
          fails = sum(len(r.get("failures") or []) for results in d for r in results)
          print(f"conftest failures: {fails}")
          sys.exit(0 if fails == 0 else 1)
          '

      - name: Copy plan into evidence
        if: always()
        run: |
          cp ${{ env.TF_WORKING_DIR }}/plan.json evidence/plan.json
          cp ${{ env.TF_WORKING_DIR }}/plan.txt evidence/plan.txt

      - name: Bundle and sign evidence
        if: always()
        env:
          VAULT: ${{ vars.EVIDENCE_VAULT }}
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          BUNDLE="evidence-${RUN_ID}-${SHA}.tar.gz"
          tar czf "${BUNDLE}" evidence/
          sha256sum "${BUNDLE}" | awk '{print $1}' > "${BUNDLE}.sha256"
          cosign sign-blob --yes --bundle "${BUNDLE}.sig.bundle" "${BUNDLE}"
          aws s3 cp "${BUNDLE}" "s3://${VAULT}/runs/${RUN_ID}/${BUNDLE}"
          aws s3 cp "${BUNDLE}.sha256" "s3://${VAULT}/runs/${RUN_ID}/${BUNDLE}.sha256"
          aws s3 cp "${BUNDLE}.sig.bundle" "s3://${VAULT}/runs/${RUN_ID}/${BUNDLE}.sig.bundle"

      - name: Upload evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grc-evidence-${{ github.run_id }}
          path: |
            evidence/
            evidence-*.tar.gz
            evidence-*.tar.gz.sha256
            evidence-*.sig.bundle
          retention-days: 90